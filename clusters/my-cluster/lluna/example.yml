---
apiVersion: v1
kind: Namespace
metadata:
  name: lluna
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example
  namespace: lluna
spec:
  replicas: 4
  selector:
    matchLabels:
      app: example
  template:
    metadata:
      labels:
        app: example
    spec:
      containers:
      - name: example
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: example
  namespace: lluna
spec:
  selector:
    app: example
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: example
  namespace: lluna
spec:
  rules:
  - host: example.localdev.me
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: example
            port:
              number: 80
